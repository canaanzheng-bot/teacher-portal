<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSLC · Student Evaluation Report Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,600;1,9..144,700&family=Noto+Sans+SC:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ==========================================================================
   MSLC Student Evaluation Report Generator
   Palette: navy #141e30 / gold #c8962e / cream #f8f5f0
   ========================================================================== */

:root {
  /* Primary green (matches assignment-tracker header) */
  --navy: #1f5e3e;
  --navy-soft: #2a7050;
  --navy-deep: #154a30;

  /* Accent (was gold, now matches tracker's emerald check marks) */
  --gold: #16a34a;
  --gold-soft: #22c55e;
  --gold-deep: #15803d;

  /* Cream / off-white surfaces */
  --cream: #f7f4ec;
  --cream-warm: #f0ebe1;
  --cream-deep: #e8e2d4;

  /* Text */
  --ink: #1a1a1a;
  --ink-soft: #4a4a4a;
  --ink-muted: #8a8676;

  /* Surfaces */
  --paper: #ffffff;
  --rule: #e8e4dc;

  /* Status colors */
  --success: #16a34a;
  --danger: #dc2626;

  --display: 'Fraunces', 'Noto Serif SC', serif;
  --sans: 'Outfit', 'Noto Sans SC', system-ui, sans-serif;
  --cn: 'Noto Sans SC', 'PingFang SC', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--sans);
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* Decorative cream gradient + grain so it doesn't feel flat */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at top left, rgba(22, 163, 74, 0.04) 0%, transparent 40%),
    radial-gradient(ellipse at bottom right, rgba(31, 94, 62, 0.03) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* ==========================================================================
   TOP BAR
   ========================================================================== */

.topbar {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--navy);
  color: var(--cream);
  border-bottom: 1px solid var(--navy-deep);
  box-shadow: 0 2px 20px rgba(11, 50, 30, 0.10);
}

.topbar-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 18px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  user-select: none;
}

.brand-mark {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: var(--cream);
  display: grid;
  place-items: center;
  font-family: var(--display);
  font-style: italic;
  font-weight: 600;
  color: var(--navy);
  font-size: 18px;
  letter-spacing: -0.02em;
  flex-shrink: 0;
}

.brand-text { line-height: 1.15; }
.brand-text .en {
  font-family: var(--display);
  font-style: italic;
  font-weight: 600;
  font-size: 20px;
  letter-spacing: -0.01em;
}
.brand-text .cn {
  font-family: var(--cn);
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--gold-soft);
  text-transform: uppercase;
  margin-top: 2px;
}

.topbar-meta {
  display: flex;
  align-items: center;
  gap: 20px;
  font-size: 12px;
  color: rgba(248,245,240,0.7);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.topbar-meta .sep {
  width: 1px;
  height: 16px;
  background: rgba(248,245,240,0.2);
}

/* ==========================================================================
   MAIN LAYOUT
   ========================================================================== */

main {
  position: relative;
  z-index: 1;
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 32px 80px;
}

.view { display: none; animation: fadeIn 0.4s ease; }
.view.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ==========================================================================
   HOME VIEW — teacher selection
   ========================================================================== */

.hero {
  padding: 64px 0 40px;
  text-align: center;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 56px;
  position: relative;
}

.hero-eyebrow {
  font-family: var(--cn);
  font-size: 12px;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--gold-deep);
  margin-bottom: 18px;
}

.hero-title {
  font-family: var(--display);
  font-style: italic;
  font-weight: 600;
  font-size: clamp(36px, 5vw, 56px);
  line-height: 1.05;
  color: var(--navy);
  letter-spacing: -0.02em;
  margin-bottom: 12px;
}

.hero-title em {
  font-style: italic;
  color: var(--gold);
}

.hero-sub {
  font-family: var(--cn);
  font-size: 16px;
  color: var(--ink-soft);
  font-weight: 400;
  letter-spacing: 0.05em;
}

.hero-rule {
  width: 56px;
  height: 1px;
  background: var(--gold);
  margin: 28px auto 0;
}

.teacher-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 24px;
}

.teacher-card {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 4px;
  padding: 32px 28px 28px;
  cursor: pointer;
  transition: all 0.35s cubic-bezier(0.2, 0.7, 0.3, 1);
  position: relative;
  overflow: hidden;
  text-align: left;
}

.teacher-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: var(--gold);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.4s cubic-bezier(0.2, 0.7, 0.3, 1);
}

.teacher-card::after {
  content: '';
  position: absolute;
  top: 24px;
  right: 28px;
  width: 8px;
  height: 8px;
  border-top: 1px solid var(--ink-muted);
  border-right: 1px solid var(--ink-muted);
  transform: rotate(45deg);
  opacity: 0;
  transition: all 0.35s cubic-bezier(0.2, 0.7, 0.3, 1);
}

.teacher-card:hover {
  border-color: var(--navy);
  transform: translateY(-3px);
  box-shadow: 0 18px 32px -16px rgba(20,30,48,0.18);
}

.teacher-card:hover::before { transform: scaleX(1); }
.teacher-card:hover::after { opacity: 0.6; transform: rotate(45deg) translate(4px, -4px); }

.teacher-card.online {
  background: linear-gradient(180deg, var(--paper) 0%, var(--cream-warm) 100%);
}

.teacher-card-num {
  font-family: var(--display);
  font-style: italic;
  font-size: 13px;
  color: var(--gold);
  letter-spacing: 0.1em;
  margin-bottom: 18px;
}

.teacher-card-name-cn {
  font-family: var(--cn);
  font-size: 26px;
  font-weight: 500;
  color: var(--navy);
  letter-spacing: 0.02em;
  margin-bottom: 6px;
}

.teacher-card-name-en {
  font-family: var(--display);
  font-style: italic;
  font-weight: 400;
  font-size: 17px;
  color: var(--ink-soft);
  margin-bottom: 24px;
}

.teacher-card-grades {
  border-top: 1px solid var(--rule);
  padding-top: 16px;
  font-family: var(--cn);
  font-size: 14px;
  color: var(--ink);
  letter-spacing: 0.04em;
  line-height: 1.7;
}

.teacher-card-grades .en {
  font-family: var(--sans);
  font-size: 12px;
  color: var(--ink-muted);
  letter-spacing: 0.08em;
  margin-top: 4px;
  text-transform: uppercase;
}

.teacher-card .pill-online {
  display: inline-block;
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 4px 10px;
  border: 1px solid var(--gold);
  color: var(--gold-deep);
  border-radius: 100px;
  margin-top: 8px;
}

.teacher-card-count {
  margin-top: 16px;
  padding-top: 14px;
  border-top: 1px dashed var(--rule);
  font-family: var(--display);
  font-style: italic;
  font-size: 13px;
  color: var(--ink-muted);
  display: flex;
  align-items: center;
  gap: 8px;
}

.count-pill {
  display: inline-grid;
  place-items: center;
  min-width: 26px;
  height: 26px;
  padding: 0 8px;
  border-radius: 100px;
  background: var(--navy);
  color: var(--cream);
  font-family: var(--sans);
  font-style: normal;
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 0.02em;
  font-feature-settings: 'tnum';
}

.count-pill.zero {
  background: transparent;
  color: var(--danger);
  border: 1px solid var(--danger);
}

.count-label {
  font-family: var(--cn);
  font-style: normal;
  font-size: 12px;
  color: var(--ink-soft);
  letter-spacing: 0.05em;
}

.loading-dot {
  display: inline-block;
  font-family: var(--display);
  font-style: italic;
  color: var(--ink-muted);
  font-size: 14px;
  animation: pulse 1.4s ease-in-out infinite;
}

.home-banner {
  margin: 28px auto 0;
  max-width: 720px;
  padding: 18px 22px;
  background: var(--paper);
  border-left: 3px solid var(--gold);
  border-radius: 3px;
  text-align: left;
  box-shadow: 0 6px 20px -10px rgba(20,30,48,0.15);
}

.home-banner.error { border-left-color: var(--danger); }

.home-banner-title {
  font-family: var(--display);
  font-style: italic;
  font-weight: 600;
  font-size: 17px;
  color: var(--navy);
  margin-bottom: 6px;
}

.home-banner-body {
  font-family: var(--cn);
  font-size: 13px;
  color: var(--ink-soft);
  line-height: 1.55;
  letter-spacing: 0.02em;
  margin-bottom: 10px;
}

.home-banner-link {
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--gold-deep);
  text-decoration: none;
}

.home-banner-link:hover { color: var(--gold); }

/* ==========================================================================
   WORKSPACE VIEW
   ========================================================================== */

.workspace-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 48px 0 28px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 36px;
  gap: 32px;
  flex-wrap: wrap;
}

.workspace-back {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--ink-muted);
  font-family: var(--sans);
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 0;
  margin-bottom: 12px;
  transition: color 0.2s;
}

.workspace-back:hover { color: var(--navy); }
.workspace-back::before { content: '←'; font-size: 16px; }

.workspace-title-cn {
  font-family: var(--cn);
  font-size: 32px;
  font-weight: 500;
  color: var(--navy);
  letter-spacing: 0.02em;
}

.workspace-title-en {
  font-family: var(--display);
  font-style: italic;
  font-weight: 400;
  font-size: 18px;
  color: var(--ink-soft);
  margin-top: 2px;
}

.workspace-title-grades {
  font-family: var(--cn);
  font-size: 13px;
  color: var(--gold-deep);
  letter-spacing: 0.1em;
  margin-top: 12px;
}

.unit-control {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.unit-control label {
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-muted);
}

.unit-control input {
  font-family: var(--display);
  font-style: italic;
  font-size: 17px;
  font-weight: 500;
  color: var(--navy);
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 3px;
  padding: 10px 14px;
  min-width: 260px;
  letter-spacing: 0.02em;
  transition: border-color 0.2s;
}

.unit-control input:focus {
  outline: none;
  border-color: var(--gold);
}

/* Student strip */
.student-strip {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 4px;
  padding: 24px 28px;
  margin-bottom: 32px;
}

.student-strip-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
  gap: 16px;
  flex-wrap: wrap;
}

.student-strip-title {
  font-family: var(--cn);
  font-size: 15px;
  font-weight: 500;
  color: var(--navy);
  letter-spacing: 0.05em;
}

.student-strip-title .en {
  font-family: var(--display);
  font-style: italic;
  font-weight: 400;
  font-size: 13px;
  color: var(--ink-muted);
  margin-left: 10px;
}

.student-strip-count {
  font-family: var(--display);
  font-style: italic;
  font-size: 13px;
  color: var(--ink-muted);
}

.student-strip-count strong {
  color: var(--gold-deep);
  font-weight: 600;
  font-style: normal;
  font-family: var(--sans);
}

.student-chips {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.level-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.level-label {
  font-family: var(--display);
  font-style: italic;
  font-size: 13px;
  color: var(--ink-soft);
  letter-spacing: 0.01em;
  padding-left: 2px;
  display: flex;
  align-items: baseline;
  gap: 8px;
}

.level-label .count {
  font-family: var(--sans);
  font-style: normal;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-muted);
  background: var(--paper);
  padding: 2px 7px;
  border-radius: 100px;
}

.level-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.chip {
  background: var(--cream);
  border: 1px solid var(--rule);
  border-radius: 100px;
  padding: 7px 14px 7px 14px;
  font-family: var(--cn);
  font-size: 13px;
  color: var(--ink);
  cursor: pointer;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}

.chip:hover {
  border-color: var(--navy);
  background: var(--paper);
}

.chip.active {
  background: var(--navy);
  color: var(--cream);
  border-color: var(--navy);
}

.chip.done {
  background: rgba(74, 124, 62, 0.08);
  border-color: rgba(74, 124, 62, 0.3);
}

.chip.done .check {
  color: var(--success);
  font-weight: 700;
  font-size: 12px;
}

.chip.active.done {
  background: var(--success);
  color: white;
  border-color: var(--success);
}

.chip.active.done .check { color: white; }

/* Traditional-Chinese learner indicator on student chips */
.trad-badge {
  display: inline-block;
  margin-left: 6px;
  padding: 0 5px;
  font-family: var(--cn);
  font-size: 10px;
  line-height: 1.6;
  color: var(--gold-deep);
  background: rgba(200, 150, 46, 0.12);
  border: 1px solid rgba(200, 150, 46, 0.35);
  border-radius: 4px;
  letter-spacing: 0;
}
.chip.active .trad-badge {
  color: var(--cream);
  background: rgba(248, 245, 240, 0.18);
  border-color: rgba(248, 245, 240, 0.4);
}

/* Banner shown in the form when a traditional-Chinese learner is selected */
.trad-banner {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  margin-bottom: 18px;
  background: linear-gradient(90deg, rgba(200,150,46,0.10), rgba(200,150,46,0.04));
  border: 1px solid rgba(200, 150, 46, 0.35);
  border-radius: 6px;
  font-family: var(--sans);
  font-size: 12.5px;
  color: var(--ink);
}
.trad-banner .trad-banner-mark {
  font-family: var(--cn);
  font-size: 16px;
  color: var(--gold-deep);
  font-weight: 600;
  letter-spacing: 0.05em;
}
.trad-banner .trad-banner-text {
  flex: 1;
}
.trad-banner .trad-banner-text .lbl {
  font-family: var(--display);
  font-style: italic;
  color: var(--gold-deep);
  margin-right: 6px;
}
.trad-banner .trad-banner-text .sub {
  color: var(--ink-soft);
  font-size: 11.5px;
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--ink-muted);
}

.empty-state-title {
  font-family: var(--display);
  font-style: italic;
  font-size: 22px;
  color: var(--ink-soft);
  margin-bottom: 8px;
}

.empty-state-sub {
  font-family: var(--cn);
  font-size: 14px;
}

/* ==========================================================================
   FORM
   ========================================================================== */

.form-shell { display: grid; grid-template-columns: 1fr 380px; gap: 32px; align-items: start; }

@media (max-width: 1080px) {
  .form-shell { grid-template-columns: 1fr; }
}

.form-main {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 4px;
  padding: 36px 40px;
}

.form-section { margin-bottom: 36px; }
.form-section:last-child { margin-bottom: 0; }

.section-head {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-bottom: 18px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--rule);
}

.section-head .num {
  font-family: var(--display);
  font-style: italic;
  font-size: 14px;
  color: var(--gold);
  letter-spacing: 0.05em;
}

.section-head .title-cn {
  font-family: var(--cn);
  font-size: 17px;
  font-weight: 500;
  color: var(--navy);
  letter-spacing: 0.05em;
}

.section-head .title-en {
  font-family: var(--display);
  font-style: italic;
  font-weight: 400;
  font-size: 14px;
  color: var(--ink-muted);
  margin-left: auto;
}

.field-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px 24px;
}

.field-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
.field-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }

@media (max-width: 720px) {
  .field-grid, .field-grid.cols-4, .field-grid.cols-3 { grid-template-columns: 1fr 1fr; }
}

.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.field-label {
  font-family: var(--cn);
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-soft);
  letter-spacing: 0.05em;
  display: flex;
  align-items: baseline;
  gap: 8px;
}

.field-label .en {
  font-family: var(--sans);
  font-size: 10px;
  color: var(--ink-muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 400;
}

.field input,
.field select,
.field textarea {
  font-family: var(--sans);
  font-size: 14px;
  color: var(--ink);
  background: var(--cream);
  border: 1px solid var(--rule);
  border-radius: 3px;
  padding: 9px 12px;
  width: 100%;
  transition: border-color 0.2s, background 0.2s;
}

.field input:focus,
.field select:focus,
.field textarea:focus {
  outline: none;
  border-color: var(--gold);
  background: var(--paper);
}

.field input[type="number"] { font-feature-settings: 'tnum'; }

.field-readonly {
  font-family: var(--cn);
  font-size: 15px;
  font-weight: 500;
  color: var(--navy);
  padding: 9px 0;
  border-bottom: 1px solid var(--rule);
}

.field-readonly .meta {
  font-family: var(--display);
  font-style: italic;
  font-size: 12px;
  color: var(--ink-muted);
  margin-left: 10px;
  font-weight: 400;
}

textarea.comment-area {
  min-height: 160px;
  resize: vertical;
  line-height: 1.7;
  font-family: var(--cn);
  font-size: 14px;
}

textarea.comment-area-en {
  font-family: var(--display);
  font-style: italic;
  font-size: 14px;
}

/* Auto-translation status line, sits directly under each comment textarea */
.translate-status {
  font-family: var(--display);
  font-style: italic;
  font-size: 11.5px;
  color: var(--ink-muted);
  letter-spacing: 0.02em;
  min-height: 16px;
  opacity: 0;
  transition: opacity 0.25s ease;
  margin-top: 2px;
}
.translate-status.show { opacity: 1; }
.translate-status.loading { color: var(--gold-deep); }
.translate-status.loading::before {
  content: '⟳ ';
  display: inline-block;
  animation: tr-spin 0.8s linear infinite;
  margin-right: 2px;

/* ==========================================================================

function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function debounce(fn, ms) {
  let t;
  return function(...args) {
    clearTimeout(t);
    t = setTimeout(() => fn.apply(this, args), ms);
  };
}

/**
 * Normalize a level string so 'Level 2', '二年级', '2', '2nd' all collapse
 * to the same canonical key.
 */
function normalizeLevel(level) {
  if (level == null) return '';
  let s = String(level).trim();
  if (!s) return '';
  s = s.toLowerCase();

  // TK / Pre-K / Kindergarten
  if (/\btk\b|pre[-\s]?k|pre[-\s]?kinder/.test(s)) return 'TK';
  if (/\bk\b|kinder|幼[儿兒]园|幼[儿兒]園|幼[稚兒]园|幼[稚兒]園/.test(s)) return 'K';

  // Chinese numerals followed by 年级/年級/级/級 (handles "二年级", "二级", "中文二级")
  const zhNum = { '一':'1','二':'2','两':'2','三':'3','四':'4','五':'5','六':'6','七':'7','八':'8','九':'9','十':'10' };
  for (const [zh, ar] of Object.entries(zhNum)) {
    if (new RegExp(zh + '\\s?[年級级]').test(s)) return ar;
  }

  // Arabic numerals anywhere (Level 2, 2nd, 2, Grade 2, G2, Beginner 1, Chinese 2, L2)
  const m = s.match(/(\d+)/);
  if (m) return m[1];

  // Fallback: bare Chinese numeral (e.g. value is just "一" or "二")
  for (const [zh, ar] of Object.entries(zhNum)) {
    if (s.includes(zh)) return ar;
  }

  return s;
}

function studentLevel(student) {
  // We filter by Chinese Level per spec
  return normalizeLevel(student['Chinese Level']);
}

/**
 * Human-readable label for a normalized Chinese Level key.
 * Used in the student strip group headers so teachers can see at a glance
 * which group each chip belongs to.
 */
function levelDisplayName(normalizedLevel) {
  const map = {
    'TK': 'TK · Pre-K',
    'K':  'K · Kindergarten',
    '1':  '一年级 · Grade 1',
    '2':  '二年级 · Grade 2',
    '3':  '三年级 · Grade 3',
    '4':  '四年级 · Grade 4',
    '5':  '五年级 · Grade 5',
    '6':  '六年级 · Grade 6',
    '7':  '七年级 · Grade 7',
    '8':  '八年级 · Grade 8'
  };
  return map[normalizedLevel] || normalizedLevel;
}

function studentMatchesTeacher(student, teacher) {
  if (!teacher.grades.length) return false;
  if (String(student.Status || '').trim().toLowerCase() === 'inactive') return false;
  const lvl = studentLevel(student);
  return teacher.grades.some(g => normalizeLevel(g) === lvl);
}

/**
 * Pick the first non-empty value from a list of possible keys.
 * The Apps Script returns students in different shapes depending on which
 * endpoint version is deployed:
 *   - older getStudents → { students: [{ name, school, grade, chineseLevel, status }] }
 *   - newer tpGetStudents → { success: true, data: [{ "Student Name", "Chinese Level", ... }] }
 * Plus the unwrap might be at top level. This handles all of it.
 */
function pickField(obj, ...keys) {
  for (const k of keys) {
    if (obj && obj[k] != null && String(obj[k]).trim() !== '') return obj[k];
  }
  return '';
}

function normalizeStudent(s) {
  return {
    'Student Name':  pickField(s, 'Student Name', 'name', 'Name', 'studentName'),
    'School Name':   pickField(s, 'School Name', 'school', 'School', 'schoolName'),
    'Current Grade': pickField(s, 'Current Grade', 'grade', 'Grade', 'currentGrade'),
    'Chinese Level': pickField(s, 'Chinese Level', 'chineseLevel', 'ChineseLevel', 'chinese_level'),
    'Math Level':    pickField(s, 'Math Level', 'mathLevel', 'MathLevel', 'math_level'),
    'Status':        pickField(s, 'Status', 'status') || 'Active',
    'script':        pickField(s, 'script', 'Script')
  };
}

function unwrapStudentsResponse(r) {
  if (Array.isArray(r)) return r;
  if (r && Array.isArray(r.students)) return r.students;
  if (r && Array.isArray(r.data)) return r.data;
  if (r && r.success && Array.isArray(r.result)) return r.result;
  return [];
}

/**
 * Normalize a column key: lowercase + strip spaces, underscores, hyphens
 * so 'Student Name', 'studentName', 'student_name', 'STUDENTNAME' all collide.
 */
function normKey(k) {
  return String(k || '').toLowerCase().replace(/[\s_\-]/g, '');
}

/**
 * Defensive accessor: looks up a value in a student record using any of
 * several possible column-name spellings. Returns '' if nothing matches.
 */
function pick(obj, ...candidates) {
  if (!obj) return '';
  const wanted = new Set(candidates.map(normKey));
  for (const [k, v] of Object.entries(obj)) {
    if (wanted.has(normKey(k))) return v == null ? '' : v;
  }
  return '';
}

/**
 * Normalize a raw student record from the API into the canonical shape the
 * rest of the app expects ('Student Name', 'Chinese Level', etc), while
 * also preserving every original key for inspection.
 */
function normalizeStudent(raw) {
  if (!raw || typeof raw !== 'object') return null;
  const out = { ...raw };
  out['Student Name']  = pick(raw, 'Student Name', 'studentName', 'name', 'StudentName', '学生姓名', '姓名');
  out['School Name']   = pick(raw, 'School Name', 'school', 'schoolName', 'SchoolName', '学校');
  out['Current Grade'] = pick(raw, 'Current Grade', 'grade', 'currentGrade', 'Grade', '年级', '在校年级');
  out['Math Level']    = pick(raw, 'Math Level', 'mathLevel', 'MathLevel', '数学程度', '数学级别');
  out['Chinese Level'] = pick(raw, 'Chinese Level', 'chineseLevel', 'ChineseLevel', '中文程度', '中文级别');
  out['Status']        = pick(raw, 'Status', 'status', '状态');
  return out;
}

/**
 * The existing API might return students as: an array, {students: [...]},
 * {data: [...]}, {result: [...]}, or {rows: [...]}. Unwrap to a flat array.
 */
function extractList(resp, ...preferredKeys) {
  if (Array.isArray(resp)) return resp;
  if (!resp || typeof resp !== 'object') return [];
  for (const k of preferredKeys) {
    if (Array.isArray(resp[k])) return resp[k];
  }
  // fallback: first array-valued property in the object
  for (const v of Object.values(resp)) {
    if (Array.isArray(v)) return v;
  }
  return [];
}

/* ==========================================================================
   API
   ========================================================================== */

async function apiGet(action, params) {
  const url = new URL(API_URL);
  url.searchParams.set('action', action);
  if (params) for (const [k,v] of Object.entries(params)) url.searchParams.set(k, v);
  const r = await fetch(url.toString(), { method: 'GET', credentials: 'omit' });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const data = await r.json();
  if (data && data.error) throw new Error(data.error);
  return data;
}

async function apiPost(action, payload) {
  // Apps Script: must use Content-Type: text/plain to avoid CORS preflight
  const body = JSON.stringify(Object.assign({ action }, payload));
  const r = await fetch(API_URL, {
    method: 'POST',
    credentials: 'omit',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body
  });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const data = await r.json();
  if (data && data.error) throw new Error(data.error);
  return data;
}

async function prefetchStudents() {
  // ─── Path A: embedded roster takes priority (no fetch needed) ───
  if (Array.isArray(EMBEDDED_ROSTER) && EMBEDDED_ROSTER.length > 0) {
    dlog('[Home] Using EMBEDDED_ROSTER (' + EMBEDDED_ROSTER.length + ' students)');
    state.studentsCache = EMBEDDED_ROSTER.map(normalizeStudent).filter(s => s && s['Student Name']);
    populateCardCounts();
    return;
  }

  // ─── Path B: try the API, with fallback to legacy getStudents ───
  try {
    let resp = await apiGet('tpGetStudents').catch(e => { dlog('[Home] tpGetStudents failed', e.message); return null; });
    let rawList = extractList(resp, 'students', 'data', 'rows', 'result');

    // Fallback to legacy getStudents (used by your existing checkout site)
    if (!rawList || rawList.length === 0) {
      dlog('[Home] Trying legacy getStudents');
      const legacy = await apiGet('getStudents').catch(e => { dlog('[Home] getStudents failed', e.message); return null; });
      rawList = extractList(legacy, 'students', 'data', 'rows', 'result');
    }

    state.studentsCache = rawList.map(normalizeStudent).filter(s => s && s['Student Name']);
    dlog(`[Home] Cached ${state.studentsCache.length} students from API`);

    populateCardCounts();

    if (state.studentsCache.length === 0) {
      showHomeBanner('No students loaded',
        'API returned no students AND EMBEDDED_ROSTER is empty. Paste your roster into the EMBEDDED_ROSTER constant near the top of this HTML file, or check that tpGetStudents is deployed and reachable. (Note: Claude\'s artifact preview sandbox blocks external fetches — open this file in a real browser to test the API.)',
        'error');
    }
  } catch (e) {
    dlog('[Home] prefetchStudents FATAL', e.message);
    TEACHERS.forEach(t => {
      const slot = document.querySelector(`[data-count-for="${t.id}"]`);
      if (slot && !t.online) slot.innerHTML = '<span style="color: var(--danger); font-family: var(--display); font-style: italic; font-size: 12px;">— offline —</span>';
    });
    showHomeBanner('Cannot reach API', e.message + ' · In Claude preview this is normal — try on a real browser, or paste roster into EMBEDDED_ROSTER.', 'error');
  }
}

function populateCardCounts() {
  TEACHERS.forEach(t => {
    const slot = document.querySelector(`[data-count-for="${t.id}"]`);
    if (!slot || t.online) return;
    const matches = state.studentsCache.filter(s => studentMatchesTeacher(s, t));
    const n = matches.length;
    slot.innerHTML = `<span class="count-pill ${n === 0 ? 'zero' : ''}">${n}</span> <span class="count-label">student${n === 1 ? '' : 's'} · ${n === 0 ? '无匹配' : '已匹配'}</span>`;
  });

  // Diagnostic: all non-online teachers have 0 matches → likely Chinese Level mismatch
  if (state.studentsCache.length > 0) {
    const offlineTeachers = TEACHERS.filter(t => !t.online);
    const allZero = offlineTeachers.every(t => state.studentsCache.filter(s => studentMatchesTeacher(s, t)).length === 0);
    if (allZero) {
      const seenLevels = [...new Set(state.studentsCache.map(s => s['Chinese Level']).filter(Boolean))];
      showHomeBanner(
        `Loaded ${state.studentsCache.length} students but 0 matched any teacher`,
        `Chinese Level values seen: ${seenLevels.slice(0, 10).map(v => `"${v}"`).join(', ')}${seenLevels.length > 10 ? '…' : ''}. Expected: 1 / 2 / 3 / 4 / 5 / 6 / TK / K (or 一年级 / Level 2 / 2nd / Beginner 2 etc).`,
        'error');
    }
  }
}

async function enterWorkspace(teacherId) {
  const teacher = TEACHERS.find(t => t.id === teacherId);
  if (!teacher) return;
  state.teacher = teacher;

  document.getElementById('view-home').classList.remove('active');
  document.getElementById('view-workspace').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });

  document.getElementById('wsTitleCn').textContent = teacher.nameCn;
  document.getElementById('wsTitleEn').textContent = teacher.nameEn;
  document.getElementById('wsTitleGrades').textContent = teacher.gradesDisplay;

  // Render shell with loading state
  document.getElementById('studentChips').innerHTML = '<div class="loading"><div class="loading-mark">M</div><div class="loading-text">Loading students · 加载中</div></div>';
  document.getElementById('studentCount').textContent = '';
  document.getElementById('formShell').innerHTML = '';

  // Online teacher: empty state
  if (teacher.online) {
    document.getElementById('studentStrip').innerHTML = `
      <div class="student-strip-head">
        <div class="student-strip-title">本期学生 <span class="en">Students this unit</span></div>
      </div>
      <div class="empty-state">
        <div class="empty-state-title">Online students reported separately</div>
        <div class="empty-state-sub">${teacher.nameCn}负责网课，请直接使用 MSLC report 模板撰写报告。<br>本系统暂不为网课学生分配名单。</div>
      </div>`;
    // still load tag library so the comment generator is usable
    await loadTeacherTags(teacher);
    renderForm(); // empty form
    return;
  }

  // Load students, tags, and completed-list in parallel
  try {
    // Reuse home-page prefetched cache if available, otherwise fetch fresh
    const studentsPromise = (state.studentsCache && state.studentsCache.length)
      ? Promise.resolve({ __cached: true, data: state.studentsCache })
      : apiGet('tpGetStudents').catch(e => { dlog('tpGetStudents ERROR', e.message); return null; });

    const [studentsResp, tagsResp, completedResp] = await Promise.all([
      studentsPromise,
      apiGet('tpGetTags', { teacher: teacher.nameCn }).catch(e => { dlog('tpGetTags ERROR', e.message); return null; }),
      apiGet('tpGetReportStatus', { teacher: teacher.nameCn, unit: state.unit }).catch(() => null)
    ]);

    dlog('tpGetStudents response (cached=' + !!(studentsResp && studentsResp.__cached) + ')', studentsResp);
    dlog('tpGetTags response', tagsResp);

    // Extract + normalize (or pass through if cached)
    if (studentsResp && studentsResp.__cached) {
      state.students = studentsResp.data;
    } else {
      const rawList = extractList(studentsResp, 'students', 'data', 'rows', 'result');
      state.students = rawList.map(normalizeStudent).filter(Boolean);
    }

    dlog(`Parsed ${state.students.length} students`, state.students.slice(0, 3));

    state.filteredStudents = state.students.filter(s => studentMatchesTeacher(s, teacher));

    dlog(`Matched ${state.filteredStudents.length} for ${teacher.nameCn} (expects ${teacher.grades.join('|')})`,
         state.filteredStudents.map(s => `${s['Student Name']} :: ${s['Chinese Level']}`));

    state.completedStudents = new Set(extractList(completedResp, 'completed', 'students', 'data'));

    // organize tags
    state.tags = { Strengths: [], Improvements: [], Encouragement: [] };
    const tagList = extractList(tagsResp, 'tags', 'data', 'rows');
    tagList.forEach(t => {
      const cat = pick(t, 'Category', 'category');
      if (state.tags[cat]) state.tags[cat].push({
        tagID: pick(t, 'TagID', 'tagID', 'id'),
        tagCn: pick(t, 'TagCN', 'tagCn', 'tagCN', 'cn'),
        tagEn: pick(t, 'TagEN', 'tagEn', 'tagEN', 'en')
      });
    });

    // Fallback to EMBEDDED_TAGS if API returned 0 tags AND we have a starter set
    applyEmbeddedTagsFallback(teacher);

    renderStudentStrip();
    renderForm();
  } catch (e) {
    console.error(e);
    dlog('enterWorkspace ERROR', e.message);
    toast('Failed to load', e.message, 'error');
    document.getElementById('studentChips').innerHTML = `<div class="empty-state"><div class="empty-state-title">Connection error</div><div class="empty-state-sub">${escapeHtml(e.message)}<br><br><a href="#" onclick="toggleDebug();return false;" style="color:var(--gold-deep);">▸ Show debug log</a></div></div>`;
  }
}

async function loadTeacherTags(teacher) {
  try {
    const tagsResp = await apiGet('tpGetTags', { teacher: teacher.nameCn });
    dlog('tpGetTags response (online)', tagsResp);
    state.tags = { Strengths: [], Improvements: [], Encouragement: [] };
    const tagList = extractList(tagsResp, 'tags', 'data', 'rows');
    tagList.forEach(t => {
      const cat = pick(t, 'Category', 'category');
      if (state.tags[cat]) state.tags[cat].push({
        tagID: pick(t, 'TagID', 'tagID', 'id'),
        tagCn: pick(t, 'TagCN', 'tagCn', 'tagCN', 'cn'),
        tagEn: pick(t, 'TagEN', 'tagEn', 'tagEN', 'en')
      });
    });
  } catch (e) {
    console.error(e);
    dlog('tpGetTags ERROR', e.message);
    state.tags = { Strengths: [], Improvements: [], Encouragement: [] };
  }
  // Always try embedded fallback after API attempt
  applyEmbeddedTagsFallback(teacher);
}

/**
 * If the API returned 0 tags total but EMBEDDED_TAGS has a starter set
 * for this teacher, seed state.tags with the embedded library.
 * Embedded tags are marked seedOnly so the UI can show them as read-only.
 */
function applyEmbeddedTagsFallback(teacher) {
  const totalApiTags = state.tags.Strengths.length + state.tags.Improvements.length + state.tags.Encouragement.length;
  if (totalApiTags > 0) return;  // teacher has API tags, don't override
  const seed = EMBEDDED_TAGS[teacher.nameCn];
  if (!seed) return;
  dlog('Applying EMBEDDED_TAGS fallback for ' + teacher.nameCn);
  for (const cat of ['Strengths', 'Improvements', 'Encouragement']) {
    (seed[cat] || []).forEach(t => {
      state.tags[cat].push({
        tagID: t.TagID,
        tagCn: t.TagCN,
        tagEn: t.TagEN,
        seedOnly: true
      });
    });
  }
}

    // Build a useful diagnostic: what came back, and what we tried to match against
    const totalLoaded = state.students.length;
    const seenLevelsRaw = [...new Set(state.students.map(s => s['Chinese Level']))].filter(v => v != null && v !== '');
    const seenLevelsNorm = [...new Set(state.students.map(s => normalizeLevel(s['Chinese Level'])))].filter(Boolean);
    const expectedNorm = state.teacher.grades.map(normalizeLevel);

    let reason;
    if (totalLoaded === 0) {
      reason = `<strong>API returned 0 students.</strong><br>检查 Apps Script 端 <code>tpGetStudents</code> 是否部署、CORS 是否允许、以及 sheet 是否有数据。`;
    } else {
      reason = `共加载了 <strong>${totalLoaded}</strong> 个学生，但没有一个的 Chinese Level 匹配 <strong>${escapeHtml(state.teacher.gradesDisplay)}</strong>。
        <br><br>
        <span style="font-family: var(--display); font-style: italic; color: var(--ink-soft);">Expected (normalized):</span>
        <code>${expectedNorm.map(escapeHtml).join(' / ') || '—'}</code>
        <br>
        <span style="font-family: var(--display); font-style: italic; color: var(--ink-soft);">Seen in data (raw):</span>
        <code>${seenLevelsRaw.map(v => escapeHtml(String(v))).join(' · ') || '—'}</code>
        <br>
        <span style="font-family: var(--display); font-style: italic; color: var(--ink-soft);">Seen (normalized):</span>
        <code>${seenLevelsNorm.map(escapeHtml).join(' · ') || '—'}</code>`;
    }

    strip.innerHTML = `<div class="diagnostic">
      <div class="diagnostic-title">没有匹配的学生 · No students matched</div>
      <div class="diagnostic-body">${reason}</div>
      <div style="margin-top: 14px;"><a href="#" onclick="toggleDebug();return false;" style="color:var(--gold-deep); font-family: var(--sans); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;">▸ Show API debug log</a></div>
    </div>`;
    document.getElementById('studentCount').textContent = totalLoaded ? `0 / ${totalLoaded} matched` : '';
    return;
  }

  // Group students by normalized Chinese Level, ordered by teacher.grades sequence
  const levelOrder = state.teacher.grades.map(normalizeLevel);
  const byLevel = new Map();
  for (const lvl of levelOrder) byLevel.set(lvl, []);
  for (const s of state.filteredStudents) {
    const norm = normalizeLevel(s['Chinese Level']);
    if (byLevel.has(norm)) byLevel.get(norm).push(s);
    else { // student level didn't match any teacher.grades — put in an "other" bucket at end
      if (!byLevel.has('_other')) byLevel.set('_other', []);
      byLevel.get('_other').push(s);
    }
  }

  // Sort within each group: completed last, then alphabetical
  const sortFn = (a, b) => {
    const ad = state.completedStudents.has(a['Student Name']) ? 1 : 0;
    const bd = state.completedStudents.has(b['Student Name']) ? 1 : 0;
    if (ad !== bd) return ad - bd;
    return String(a['Student Name']).localeCompare(String(b['Student Name']), 'zh');
  };

  const renderChip = (s) => {
    const done = state.completedStudents.has(s['Student Name']);
    const active = state.selectedStudent && state.selectedStudent['Student Name'] === s['Student Name'];
    const isTrad = s.script === 'traditional';
    return `<div class="chip ${done ? 'done' : ''} ${active ? 'active' : ''} ${isTrad ? 'trad' : ''}" data-student="${escapeHtml(s['Student Name'])}">
      ${done ? '<span class="check">✓</span>' : ''}${escapeHtml(s['Student Name'])}${isTrad ? '<span class="trad-badge" title="Traditional Chinese learner · 繁體中文学习者">繁</span>' : ''}
    </div>`;
  };

  // If only one non-empty group, render as a flat strip (no section header needed)
  const nonEmptyGroups = [...byLevel.entries()].filter(([_, students]) => students.length > 0);
  if (nonEmptyGroups.length <= 1) {
    const all = state.filteredStudents.slice().sort(sortFn);
    strip.innerHTML = `<div class="level-chips">${all.map(renderChip).join('')}</div>`;
  } else {
    strip.innerHTML = nonEmptyGroups.map(([level, students]) => {
      const sortedGroup = students.slice().sort(sortFn);
      const label = level === '_other' ? 'Other · 其他' : levelDisplayName(level);
      return `<div class="level-group">
        <div class="level-label">${escapeHtml(label)}<span class="count">${students.length}</span></div>
        <div class="level-chips">${sortedGroup.map(renderChip).join('')}</div>
      </div>`;
    }).join('');
  }

  // Event delegation: handle clicks via data attribute (safe against quotes in names)
  document.getElementById('studentChips').onclick = (e) => {
    const chip = e.target.closest('.chip[data-student]');
    if (chip) selectStudent(chip.getAttribute('data-student'));
  };

  const total = state.filteredStudents.length;
  const doneCount = state.filteredStudents.filter(s => state.completedStudents.has(s['Student Name'])).length;
  document.getElementById('studentCount').textContent = `${doneCount} / ${total} completed`;
}

function selectStudent(name) {
  const stud = state.filteredStudents.find(s => s['Student Name'] === name);
  if (!stud) return;
  // Flush draft for currently-selected student before switching keys
  if (state.selectedStudent && state.selectedStudent['Student Name'] !== name) {
    saveDraft();
  }
  state.selectedStudent = stud;
  state.selectedTags = { Strengths: new Set(), Improvements: new Set(), Encouragement: new Set() };
  renderStudentStrip();
  renderForm();
  // smooth scroll to form
  setTimeout(() => {
    document.getElementById('formShell').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);
}

function renderTagList(category) {
  const list = state.tags[category] || [];
  if (!list.length) return '<div class="tag-empty">No tags yet · 暂无标签</div>';
  return list.map(t => {
    const sel = state.selectedTags[category].has(t.tagID);
    const removable = state.editMode && !t.seedOnly;
    const seedBadge = t.seedOnly ? '<span style="font-family: var(--display); font-style: italic; font-size: 9px; color: var(--gold-soft); margin-left: 4px; opacity: 0.6;">·seed</span>' : '';
    return `<div class="tag ${sel ? 'selected' : ''} ${state.editMode ? 'edit-mode' : ''}"
                 data-id="${escapeHtml(t.tagID)}"
                 onclick="onTagClick(event, '${category}', '${escapeHtml(t.tagID)}')">
      ${escapeHtml(t.tagCn)}
      <span style="opacity: 0.5; font-size: 10px; margin-left: 2px;">${escapeHtml(t.tagEn || '')}</span>${seedBadge}
      ${removable ? `<span class="tag-remove" onclick="event.stopPropagation(); removeTag('${category}', '${escapeHtml(t.tagID)}')">✕</span>` : ''}
    </div>`;
  }).join('');
}

function onTagClick(ev, category, tagID) {
  if (state.editMode) return;
  ev.stopPropagation();
  if (state.selectedTags[category].has(tagID)) {
    state.selectedTags[category].delete(tagID);
  } else {
    state.selectedTags[category].add(tagID);
  }
  document.getElementById('tagList_' + category).innerHTML = renderTagList(category);
}

function toggleEditMode() {
  state.editMode = !state.editMode;
  document.getElementById('editToggle').classList.toggle('active', state.editMode);
  document.getElementById('editToggle').textContent = state.editMode ? '完成' : '编辑';
  TAG_CATEGORIES.forEach(cat => {
    document.getElementById('tagList_' + cat.key).innerHTML = renderTagList(cat.key);
  });
}

function toggleAddInput(category) {
  const row = document.getElementById('addRow_' + category);
  row.classList.toggle('show');
  if (row.classList.contains('show')) {
    document.getElementById('addCn_' + category).focus();
  }
}

async function addTag(category) {
  const cnEl = document.getElementById('addCn_' + category);
  const enEl = document.getElementById('addEn_' + category);
  const tagCn = cnEl.value.trim();
  const tagEn = enEl.value.trim();
  if (!tagCn) {
    toast('Missing input', '中文标签不能为空', 'error');
    return;
  }
  try {
    const res = await apiPost('tpAddTag', {
      teacher: state.teacher.nameCn,
      category,
      tagCn,
      tagEn
    });
    const newTag = {
      tagID: res.tagID || res.TagID || ('t_' + Date.now()),
      tagCn,
      tagEn
    };
    state.tags[category].push(newTag);
    cnEl.value = ''; enEl.value = '';
    document.getElementById('addRow_' + category).classList.remove('show');
    document.getElementById('tagList_' + category).innerHTML = renderTagList(category);
    toast('Added', `${tagCn}`, 'success');
  } catch (e) {
    toast('Add failed', e.message, 'error');
  }
}

async function removeTag(category, tagID) {
  if (!confirm('删除此标签？此操作不可撤销。')) return;
  try {
    await apiPost('tpRemoveTag', { teacher: state.teacher.nameCn, tagID });
    state.tags[category] = state.tags[category].filter(t => t.tagID !== tagID);
    state.selectedTags[category].delete(tagID);
    document.getElementById('tagList_' + category).innerHTML = renderTagList(category);
    toast('Removed', '', 'success');
  } catch (e) {
    toast('Remove failed', e.message, 'error');
  }
}

function readForm() {
  const out = {};
  formInputIds().forEach(id => {
    const el = document.getElementById(id);
    if (el) out[id] = el.value;
  });
  return out;
}

function writeForm(data) {
  formInputIds().forEach(id => {
    const el = document.getElementById(id);
    if (el && data[id] != null) el.value = data[id];
  });
}

function bindFormInputs() {
  formInputIds().forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('input', onFormChange);
    el.addEventListener('change', onFormChange);
  });
}

function onFormChange() {
  setSaveStatus('saving');
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    saveDraft();
    setSaveStatus('saved');
  }, 500);
}

function setSaveStatus(s) {
  const el = document.getElementById('saveStatus');
  if (!el) return;
  el.classList.remove('saving','saved');
  if (s === 'saving') { el.classList.add('saving'); el.textContent = 'Saving draft… · 正在保存草稿'; }
  else if (s === 'saved') { el.classList.add('saved'); el.textContent = '✓ Draft saved locally · 草稿已保存到本机'; }
  else el.textContent = 'Auto-saving drafts to this browser · 草稿保存在本机';
}

function draftKey() {
  if (!state.teacher || !state.selectedStudent) return null;
  return `mslc-report-draft::${state.teacher.id}::${state.unit}::${state.selectedStudent['Student Name']}`;
}

function saveDraft() {
  const k = draftKey();
  if (!k) return;
  const payload = {
    form: readForm(),
    selectedTags: {
      Strengths: [...state.selectedTags.Strengths],
      Improvements: [...state.selectedTags.Improvements],
      Encouragement: [...state.selectedTags.Encouragement]
    },
    savedAt: new Date().toISOString()
  };
  try { localStorage.setItem(k, JSON.stringify(payload)); } catch (e) { console.warn(e); }
}

function loadDraft() {
  const k = draftKey();
  if (!k) return;
  try {
    const raw = localStorage.getItem(k);
    if (!raw) return;
    const data = JSON.parse(raw);
    writeForm(data.form || {});
    if (data.selectedTags) {
      state.selectedTags = {
        Strengths: new Set(data.selectedTags.Strengths || []),
        Improvements: new Set(data.selectedTags.Improvements || []),
        Encouragement: new Set(data.selectedTags.Encouragement || [])
      };
      TAG_CATEGORIES.forEach(cat => {
        const el = document.getElementById('tagList_' + cat.key);
        if (el) el.innerHTML = renderTagList(cat.key);
      });
    }
    setSaveStatus('saved');
  } catch (e) { console.warn(e); }
}

function clearDraft() {
  if (!confirm('清空当前学生的所有草稿？')) return;
  const k = draftKey();
  if (k) localStorage.removeItem(k);
  // reset form
  formInputIds().forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    if (el.type === 'date') el.value = new Date().toISOString().slice(0,10);
    else el.value = '';
  });
  state.selectedTags = { Strengths: new Set(), Improvements: new Set(), Encouragement: new Set() };
  TAG_CATEGORIES.forEach(cat => {
    document.getElementById('tagList_' + cat.key).innerHTML = renderTagList(cat.key);
  });
  setSaveStatus('idle');
  toast('Cleared', '草稿已清空', 'success');
}

/* ==========================================================================
   COMMENT AUTO-TRANSLATION
   --------------------------------------------------------------------------
   On blur of either comment textarea, if the *other* textarea is still empty,
   call apiPost('tpTranslate', {text, targetLang}) and fill it in.
   - CN textarea blur  → translate to English  (targetLang = 'en')
   - EN textarea blur  → translate to Chinese  (targetLang = 'zh-TW' for
     traditional-script students, 'zh' otherwise)
   - Never overwrites existing content
   - Race-safe: re-checks the destination is still empty after await
   ========================================================================== */

function setTranslateStatus(targetId, kind, text) {
  const el = document.querySelector(`.translate-status[data-for="${targetId}"]`);
  if (!el) return;
  el.classList.remove('show', 'loading', 'success', 'error');
  if (!kind) {
    el.textContent = '';
    return;
  }
  el.classList.add('show', kind);
  el.textContent = text || '';
}

async function autoTranslateOnBlur(srcEl, dstEl, targetLang) {
  if (!srcEl || !dstEl) return;
  const text = (srcEl.value || '').trim();
  if (!text) return;                          // nothing to translate
  if ((dstEl.value || '').trim()) return;     // don't overwrite existing content

  const dstId = dstEl.id;
  setTranslateStatus(dstId, 'loading', 'Translating… 翻译中');

  try {
    const res = await apiPost('tpTranslate', { text: text, targetLang: targetLang });

    // Race-safe: between the await above and now the teacher may have typed
    // something into the destination. If so, leave their work alone.
    if ((dstEl.value || '').trim()) {
      setTranslateStatus(dstId, null);
      return;
    }

    if (res && res.ok && res.translated) {
      dstEl.value = res.translated;
      // Trigger the same draft-autosave path as a manual edit so the
      // translation gets persisted to localStorage.
      onFormChange();
      setTranslateStatus(dstId, 'success', '✓ Auto-translated · 已自动翻译');
      setTimeout(() => setTranslateStatus(dstId, null), 3500);
    } else {
      const errMsg = (res && res.error) ? res.error : 'Translation failed';
      setTranslateStatus(dstId, 'error', '✕ ' + errMsg);
      setTimeout(() => setTranslateStatus(dstId, null), 4500);
    }
  } catch (e) {
    setTranslateStatus(dstId, 'error', '✕ ' + (e.message || 'Translation failed'));
    setTimeout(() => setTranslateStatus(dstId, null), 4500);
  }
}

function bindCommentTranslation() {
  const cnEl = document.getElementById('f_comment_cn');
  const enEl = document.getElementById('f_comment_en');
  if (!cnEl || !enEl) return;

  // CN → EN on blur of the Chinese textarea
  cnEl.addEventListener('blur', () => {
    autoTranslateOnBlur(cnEl, enEl, 'en');
  });

  // EN → CN on blur of the English textarea
  // Traditional-script students get zh-TW, everyone else gets zh (simplified)
  enEl.addEventListener('blur', () => {
    const s = state.selectedStudent;
    const targetLang = (s && s.script === 'traditional') ? 'zh-TW' : 'zh';
    autoTranslateOnBlur(enEl, cnEl, targetLang);
  });
}

/* ==========================================================================
   COMMENT GENERATOR
   ========================================================================== */

function getSelectedTagObjects(category) {
  // Return tags in SELECTION order — the order the teacher tapped them in.
  // Set preserves insertion order, so iterating selectedTags directly gives us
  // the click sequence. This lets the teacher control sentence flow.
  const sel = state.selectedTags[category];
  const idToTag = new Map(state.tags[category].map(t => [t.tagID, t]));
  return [...sel].map(id => idToTag.get(id)).filter(Boolean);
}

function generateComment() {
  if (!state.selectedStudent && !state.teacher.online) {
    toast('Pick a student', '请先选择一位学生', 'error');
    return;
  }

  const s = state.selectedStudent;
  const fullName = s ? (s['Student Name'] || '') : '';
  const cnName = extractChineseName(fullName);
  const enName = extractEnglishName(fullName);

  const str = getSelectedTagObjects('Strengths');
  const imp = getSelectedTagObjects('Improvements');
  const enc = getSelectedTagObjects('Encouragement');

  if (!str.length && !imp.length && !enc.length) {
    toast('No tags selected', '请先选择标签', 'error');
    return;
  }

  // ─── Chinese paragraph ───
  // Voices supported:
  //   2p         (李老师):    "这学期你{...}。但是{imp}。{enc}。"
  //   3p         (黄老师):    "{name}小朋友在本学期的中文学习中{...}。但是{imp}。{enc}。"
  //   3p_unit    (嘉楠老师):  "{name}在第X单元{...}。接下来需要{imp}。{enc}。"
  //   3p_tongxue (晓娟老师):  "{name}同学{...}。但是{imp}。{enc}。"  — uses English nickname
  const voice = (state.teacher && state.teacher.voice) || '3p';
  const cnSentences = [];

  if (str.length) {
    const cns = str.map(t => t.tagCn);
    if (voice === '2p') {
      cnSentences.push(`这学期你${cns.join('，')}。`);
    } else if (voice === '3p_unit') {
      const cnUnit = extractUnitChineseNumeral(state.unit);
      const unitPhrase = cnUnit ? `在第${cnUnit}单元` : '在本单元';
      const first = cns[0];
      const rest = cns.slice(1);
      const nounLed = /^(表现|进步|课堂|学习态度|学习意愿|整体|状态|字形|书写)/.test(first);
      const connector = nounLed ? '的' : '';
      cnSentences.push(rest.length
        ? `${cnName}${unitPhrase}${connector}${first}，${rest.join('，')}。`
        : `${cnName}${unitPhrase}${connector}${first}。`);
    } else if (voice === '3p_tongxue') {
      // 晓娟老师 K/TK voice: prefers English nickname even in Chinese (Beckett同学,
      // Adrian同学 — not 翟嘉源). Drop "同学" suffix when the name is already
      // Chinese (e.g. 锦轩) for a more natural feel.
      const displayName = enName || cnName;
      const hasCnChars = /[\u4e00-\u9fff]/.test(displayName);
      const suffix = hasCnChars ? '小朋友' : '同学';
      const first = cns[0];
      const rest = cns.slice(1);
      cnSentences.push(rest.length
        ? `${displayName}${suffix}${first}，${rest.join('，')}。`
        : `${displayName}${suffix}${first}。`);
    } else {
      const first = cns[0];
      const rest = cns.slice(1);
      const selfContained = /^(是个|喜欢)/.test(first);
      const opener = selfContained
        ? `${cnName}小朋友${first}`
        : `${cnName}小朋友在本学期的中文学习中${first}`;
      cnSentences.push(rest.length ? `${opener}，${rest.join('，')}。` : `${opener}。`);
    }
  }
  if (imp.length) {
    let prefix = '';
    if (str.length) {
      prefix = (voice === '3p_unit') ? '接下来需要' : '但是';
    } else if (voice === '3p_unit') {
      prefix = '需要';
    }
    cnSentences.push(`${prefix}${imp.map(t => t.tagCn).join('，')}。`);
  }
  if (enc.length) {
    cnSentences.push(`${enc.map(t => t.tagCn).join('，')}。`);
  }
  let cnText = cnSentences.join('');
  // If the student is a traditional-Chinese learner, convert the assembled
  // Chinese paragraph from Simplified to Traditional so the teacher gets
  // 繁體 output ready to drop into the report.
  const isTraditional = state.selectedStudent && state.selectedStudent.script === 'traditional';
  if (isTraditional) {
    cnText = toTraditional(cnText);
  }

  // ─── English paragraph ───
  // 2p:       "This semester, you {tag1}, {tag2}. However, you {imp}. {enc}!"
  // 3p:       "{Name} {tag1}, {tag2}. However, {Name} {imp}. {enc}!"
  // 3p_unit:  "In Unit {N}, {Name} {tag1}, {tag2}. Moving forward, {Name} needs to {imp}. {enc}!"
  const enSentences = [];
  if (str.length) {
    const ens = str.map(t => t.tagEn || '').filter(Boolean);
    if (ens.length) {
      if (voice === '2p') {
        const lcEns = ens.map(lowercaseFirst);
        enSentences.push(`This semester, you ${lcEns.join(', ')}.`);
      } else if (voice === '3p_unit') {
        const unitNum = extractUnitNumber(state.unit);
        const unitPhrase = unitNum ? `In Unit ${unitNum}, ` : 'This unit, ';
        const lcEns = ens.map(lowercaseFirst);
        enSentences.push(`${unitPhrase}${enName} ${lcEns.join(', ')}.`);
      } else {
        const first = lowercaseFirst(ens[0]);
        const rest = ens.slice(1).map(lowercaseFirst);
        enSentences.push(rest.length
          ? `${enName} ${first}, ${rest.join(', ')}.`
          : `${enName} ${first}.`);
      }
    }
  }
  if (imp.length) {
    const ens = imp.map(t => t.tagEn || '').filter(Boolean).map(lowercaseFirst);
    if (ens.length) {
      if (voice === '3p_unit') {
        enSentences.push(`Moving forward, ${enName} needs to ${ens.join(', ')}.`);
      } else {
        const subj = (voice === '2p') ? 'you' : enName;
        enSentences.push(`However, ${subj} ${ens.join('; ')}.`);
      }
    }
  }
  if (enc.length) {
    const ens = enc.map(t => t.tagEn || '').filter(Boolean);
    if (ens.length) enSentences.push(`${ens.join('. ')}!`);
  }
  const enText = enSentences.join(' ');

  // Only overwrite if blank, otherwise append
  const cnEl = document.getElementById('f_comment_cn');
  const enEl = document.getElementById('f_comment_en');
  if (cnEl) {
    cnEl.value = cnEl.value.trim() ? (cnEl.value.trim() + '\n' + cnText) : cnText;
  }
  if (enEl) {
    enEl.value = enEl.value.trim() ? (enEl.value.trim() + '\n' + enText) : enText;
  }
  onFormChange();
  toast('Generated', '已生成评语，可继续编辑', 'success');
}

/**
 * Extract a usable Chinese name from a "Full Name (中文名)" string.
 * Examples:
 *   "Aaron Monk (孟轶凡)"           → "孟轶凡"
 *   "Aspen Su"                       → "Aspen"  (no Chinese, fall back to English first name)
 *   "Christy Chan*(陳紫瑩)"          → "陳紫瑩"
 *   "Louis Gonzalo Aniano Cao(曹麓祎)" → "曹麓祎"
 *   "杨婷"                           → "杨婷"
 */
function extractChineseName(fullName) {
  if (!fullName) return '该同学';
  // Prefer Chinese chars inside parentheses
  const inParens = fullName.match(/[（(]([^)）*]+)[)）]/);
  if (inParens && /[\u4e00-\u9fff]/.test(inParens[1])) return inParens[1].trim();
  // Any Chinese chars in the string
  const cn = fullName.match(/[\u4e00-\u9fff]+/g);
  if (cn) return cn.join('');
  // Fall back to first English word (strip asterisks/parens)
  const clean = fullName.replace(/[*（()）]/g, '').trim().split(/\s+/)[0];
  return clean || '该同学';
}

/**
 * Extract a usable English first name. Strip parentheticals + asterisks,
 * then prefer the first Latin-script word — this handles 嘉楠老师's roster
 * where names are written as "邵瑞哲 Damon" and the English part comes second.
 *   "Aaron Monk (孟轶凡)" → "Aaron"
 *   "邵瑞哲 Damon"        → "Damon"
 *   "Aspen Su"             → "Aspen"
 *   "杨婷"                  → "杨婷"   (no Latin chars, fall through)
 */
function extractEnglishName(fullName) {
  if (!fullName) return 'The student';
  const stripped = fullName.replace(/[（(][^)）]*[)）]/g, '').replace(/[*]/g, '').trim();
  // Prefer the first Latin-script word if one exists
  const latinMatch = stripped.match(/[A-Za-z][A-Za-z'-]*/);
  if (latinMatch) return latinMatch[0];
  // Fall through to first whitespace-separated token (likely all Chinese)
  return stripped.split(/\s+/)[0] || 'The student';
}

function lowercaseFirst(s) {
  if (!s) return s;
  return s.charAt(0).toLowerCase() + s.slice(1);
}

/**
 * Parse a unit number from a free-form unit string and return its
 * Chinese-numeral form. Used in 3p_unit voice (嘉楠老师).
 *   "2025-2026 unit 3"  → "三"
 *   "Unit 12"           → "12"   (numbers > 10 stay Arabic)
 *   "第三单元"          → "三"
 *   "Mid-term"          → null   (no unit number found)
 */
function extractUnitChineseNumeral(unitStr) {
  if (!unitStr) return null;
  const s = String(unitStr);
  // Try "unit N" pattern
  const arMatch = s.match(/unit\s*(\d+)/i);
  if (arMatch) return arabicToChineseNumeral(arMatch[1]);
  // Try "第N单元" pattern (already Chinese)
  const cnMatch = s.match(/第\s*([一二三四五六七八九十\d]+)\s*单元/);
  if (cnMatch) {
    const num = cnMatch[1];
    return /\d/.test(num) ? arabicToChineseNumeral(num) : num;
  }
  return null;
}

/**
 * Parse a unit number for English templates. Returns the bare number
 * (e.g. "3") or null if no unit number was found.
 */
function extractUnitNumber(unitStr) {
  if (!unitStr) return null;
  const m = String(unitStr).match(/unit\s*(\d+)/i);
  return m ? m[1] : null;
}

function arabicToChineseNumeral(n) {
  const map = { '1':'一','2':'二','3':'三','4':'四','5':'五','6':'六','7':'七','8':'八','9':'九','10':'十' };
  return map[String(n)] || String(n);
}

/**
 * Simplified → Traditional Chinese character map.
 * Built from the vocabulary actually used in this app's tag libraries and
 * template strings. Not comprehensive — but covers the ~99% case of comment
 * generation. For ambiguous chars (后/復 etc.) we pick the form most common
 * in the school's reports (Taiwan / HK convention).
 *
 * Used when a student has `script: 'traditional'` on their roster entry.
 */
const S2T_MAP = (() => {
  const pairs = [
    // Function words & particles
    ['们','們'],['这','這'],['个','個'],['来','來'],['过','過'],['后','後'],
    ['里','裡'],['于','於'],['为','為'],['从','從'],['对','對'],['还','還'],
    ['给','給'],['当','當'],['让','讓'],['着','著'],['与','與'],['会','會'],
    ['请','請'],['长','長'],['国','國'],
    // Education core
    ['学','學'],['习','習'],['课','課'],['师','師'],['业','業'],['务','務'],
    ['题','題'],['试','試'],['评','評'],['议','議'],['论','論'],['纪','紀'],
    ['实','實'],['发','發'],['条','條'],['层','層'],['称','稱'],['备','備'],
    ['设','設'],['离','離'],['转','轉'],['圆','圓'],
    // Time & space
    ['时','時'],['间','間'],['际','際'],['场','場'],['处','處'],['边','邊'],
    ['远','遠'],['围','圍'],
    // Actions & cognition
    ['现','現'],['进','進'],['动','動'],['听','聽'],['说','說'],['读','讀'],
    ['写','寫'],['认','認'],['识','識'],['记','記'],['忆','憶'],['讲','講'],
    ['应','應'],['愿','願'],['觉','覺'],['见','見'],['问','問'],['变','變'],
    ['开','開'],['关','關'],['译','譯'],['传','傳'],['达','達'],
    // States & adjectives
    ['优','優'],['强','強'],['稳','穩'],['态','態'],['满','滿'],['难','難'],
    ['尽','盡'],['极','極'],['积','積'],['总','總'],['显','顯'],['渐','漸'],
    ['丰','豐'],['简','簡'],['杂','雜'],['较','較'],['紧','緊'],
    // Body / structure / parts
    ['体','體'],['结','結'],['构','構'],['细','細'],['头','頭'],['节','節'],
    ['页','頁'],
    // Communication
    ['响','響'],['声','聲'],['语','語'],['词','詞'],['话','話'],
    // Writing & characters
    ['汉','漢'],['书','書'],['笔','筆'],['画','畫'],['图','圖'],['迹','跡'],
    // Review & check
    ['复','複'],['检','檢'],['验','驗'],['错','錯'],['准','準'],
    // Focus & execution
    ['专','專'],['执','執'],['马','馬'],
    // Units & groups
    ['单','單'],['员','員'],['团','團'],['帮','幫'],['众','眾'],
    // Relations & systems
    ['系','係'],['统','統'],['观','觀'],['点','點'],
    // Quantity & type
    ['数','數'],['类','類'],['种','種'],['号','號'],['码','碼'],
    // Things in life
    ['风','風'],['门','門'],['电','電'],['机','機'],['车','車'],
    // Colors & images
    ['颜','顏'],
    // History / responsibility
    ['历','歷'],['顾','顧'],['标','標'],['别','別'],['该','該'],['换','換'],
    ['励','勵'],['韧','韌'],['责','責'],['担','擔'],
    // Continuity
    ['续','續'],['终','終'],['继','繼'],
    // Choice & decision
    ['选','選'],['择','擇'],['决','決'],
    // Feelings
    ['怀','懷'],['绪','緒'],['虑','慮'],
    // Place
    ['园','園'],['楼','樓'],
    // Misc
    ['齐','齊'],['额','額'],['适','適'],['样','樣'],['础','礎'],['钟','鐘'],
    ['调','調'],['详','詳'],
    // Foundation / specifics
    ['巩','鞏'],['汇','彙'],['丽','麗'],['战','戰'],['飞','飛'],
    // Names in traditional learners
    ['吴','吳'],['晓','曉'],['黄','黃'],
    // Punctuation: quotation marks
    ['"','「'],
  ];
  const map = {};
  for (const [s, t] of pairs) map[s] = t;
  return map;
})();

/**
 * Convert a simplified-Chinese string to traditional using S2T_MAP.
 * Characters not in the map are passed through unchanged. Non-Chinese
 * content (English, digits, punctuation) is also untouched.
 */
function toTraditional(text) {
  if (!text) return text;
  let out = '';
  for (const c of text) out += (S2T_MAP[c] || c);
  return out;
}

function joinList(items) {
  if (!items.length) return '';
  if (items.length === 1) return items[0];
  if (items.length === 2) return items[0] + ' and ' + items[1];
  return items.slice(0, -1).join(', ') + ', and ' + items[items.length - 1];
}

function capitalize(s) {
  if (!s) return '';
  return s.charAt(0).toUpperCase() + s.slice(1);
}

.table-block { margin-bottom: 12px; }
.table-title {

table.t {

table.t th {

@media print {

</style>

<body>

/* ==========================================================================
   PREVIEW / SAVE & PRINT
   ========================================================================== */

function previewReport() {
  if (!state.selectedStudent) {
    toast('Pick a student', '请先选择一位学生', 'error');
    return;
  }
  const html = buildReportHtml();
  openReportWindow(html);
}

function openReportWindow(html) {
  const w = window.open('', '_blank');
  if (!w) {
    toast('Pop-up blocked', 'Please allow pop-ups for printing', 'error');
    return null;
  }
  w.document.open();
  w.document.write(html);
  w.document.close();
  return w;
}

async function saveAndPrint() {
  if (!state.selectedStudent) {
    toast('Pick a student', '请先选择一位学生', 'error');
    return;
  }
  const btn = document.getElementById('saveBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }

  const html = buildReportHtml();
  const reportWindow = openReportWindow(html);

  // POST to Apps Script (silently — UI proceeds with print regardless)
  const payload = {
    teacher: state.teacher.nameCn,
    teacherEn: state.teacher.nameEn,
    studentName: state.selectedStudent['Student Name'],
    unit: state.unit,
    html: html,
    dateStamp: new Date().toISOString()
  };

  let driveSuccess = false;
  try {
    const res = await apiPost('tpSaveReport', payload);
    if (res && (res.ok || res.success)) {
      driveSuccess = true;
      toast('Saved to Drive', `${state.selectedStudent['Student Name']} · ${state.unit}`, 'success');
      // Mark as completed
      state.completedStudents.add(state.selectedStudent['Student Name']);
      renderStudentStrip();
    } else {
      toast('Drive save returned non-ok', JSON.stringify(res).slice(0,120), 'error');
    }
  } catch (e) {
    console.error(e);
    toast('Drive save failed', e.message || 'Apps Script endpoint not ready yet — local print still works', 'error');
  }

  if (btn) { btn.disabled = false; btn.textContent = 'Save & Print · 保存并打印'; }

  // Auto-trigger print in the new window once ready
  if (reportWindow) {
    setTimeout(() => {
      try { reportWindow.focus(); } catch (e) {}
    }, 400);
  }
}

/* ==========================================================================
   INIT
   ========================================================================== */

document.getElementById('unitInput').addEventListener('change', async (e) => {
  // Flush any draft under the OLD unit key before mutating state.unit
  if (state.selectedStudent) saveDraft();

  state.unit = e.target.value.trim() || '2025-2026 unit 3';

  // refresh completed list for new unit
  if (state.teacher && !state.teacher.online) {
    try {
      const r = await apiGet('tpGetReportStatus', { teacher: state.teacher.nameCn, unit: state.unit });
      state.completedStudents = new Set(r.completed || r || []);
      renderStudentStrip();
    } catch (err) { console.warn(err); }
  }
  // reload draft for current student under NEW unit key
  if (state.selectedStudent) loadDraft();
});

renderHome();

</script>
